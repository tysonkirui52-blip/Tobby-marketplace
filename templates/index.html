<!DOCTYPE html>
<html>
<head>
    <title>Tobby SecondHand Hub</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:15px;
        }

        .sellbtn{
            display:block;
            width:200px;
            margin:15px auto;
            background:green;
            color:white;
            text-align:center;
            padding:10px;
            text-decoration:none;
            border-radius:5px;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
        }

        .card{
            background:white;
            width:90%;
            max-width:320px;
            margin:10px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .content{
            padding:12px;
        }

        .btn{
            display:block;
            margin-top:8px;
            text-align:center;
            padding:10px;
            border-radius:5px;
            color:white;
            text-decoration:none;
        }

        .wa{
            background:#25D366;
        }

        .call{
            background:#007bff;
        }

    </style>
</head>

<body>

<header>
    <h2>Tobby SecondHand Hub</h2>
    <p>Buy & Sell Items Easily</p>
</header>

<a class="sellbtn" href="/sell">+ Sell Item</a>

<div class="container">

{% for p in products %}

<div class="card">

{% if p.image %}
<img src="/uploads/{{ p.image }}">
{% endif %}

<div class="content">

<h3>{{ p.name }}</h3>
<p><b>{{ p.price }}</b></p>
<p>{{ p.description }}</p>

<a class="btn wa"
href="https://wa.me/{{ p.phone }}"
target="_blank">
💬 WhatsApp Seller
</a>

<a class="btn call"
href="tel:{{ p.phone }}">
📞 Call Seller
</a>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
