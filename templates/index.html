<!DOCTYPE html>
<html>
<head>
    <title>Tobby SecondHand Hub</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:#f2f4f5;
        }

        header{
            background:#002f34;
            color:white;
            padding:15px;
            text-align:center;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            padding:10px;
            background:white;
        }

        .sellbtn{
            background:#23e5db;
            color:#002f34;
            padding:10px;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .container{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
            gap:15px;
            padding:15px;
        }

        .card{
            background:white;
            border-radius:8px;
            overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.2s;
        }

        .card:hover{
            transform:scale(1.02);
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .content{
            padding:10px;
        }

        .price{
            font-size:18px;
            font-weight:bold;
            color:#002f34;
        }

        .title{
            font-size:15px;
            margin:5px 0;
        }

        .desc{
            font-size:13px;
            color:gray;
        }

        .btn{
            display:block;
            margin-top:8px;
            text-align:center;
            padding:8px;
            border-radius:5px;
            color:white;
            text-decoration:none;
        }

        .wa{ background:#25D366; }
        .call{ background:#007bff; }

        .search{
            width:90%;
            padding:10px;
            margin:10px auto;
            display:block;
            border:1px solid #ccc;
            border-radius:5px;
        }

    </style>
</head>

<body>

<header>
    <h2>Tobby Marketplace</h2>
    <p>Buy & Sell Anything Easily</p>
</header>

<div class="topbar">
    <a class="sellbtn" href="/sell">+ Sell Item</a>
</div>

<input class="search" placeholder="Search products... (coming soon)">

<div class="container">

{% for p in products %}

<div class="card">

    {% if p.image %}
    <img src="/uploads/{{ p.image }}">
    {% endif %}

    <div class="content">

        <div class="price">Ksh {{ p.price }}</div>
        <div class="title">{{ p.name }}</div>
        <div class="desc">{{ p.description }}</div>

        <a class="btn wa"
        href="https://wa.me/{{ p.phone }}"
        target="_blank">
        💬 WhatsApp Seller
        </a>

        <a class="btn call"
        href="tel:{{ p.phone }}">
        📞 Call Seller
        </a>

    </div>

</div>

{% endfor %}

</div>

</body>
</html>
